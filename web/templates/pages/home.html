{{define "content"}}
<section class="mb-12">
    <h1 class="mb-3 text-3xl font-bold tracking-tight">{{t "home.heading"}}</h1>
    <p class="text-zinc-600 dark:text-zinc-400">{{t "home.intro"}}</p>
</section>

<!-- HTMX demo: a todo list backed by SQLite. Every mutation returns the
     "todo-list" partial, which replaces #todo-list. Delete this section
     (plus internal/handlers/todos.go and the todos migration) when
     starting a real project. -->
<section class="rounded-xl border border-zinc-200 bg-white p-6 shadow-sm dark:border-zinc-800 dark:bg-zinc-900">
    <h2 class="mb-4 text-xl font-semibold">{{t "todos.heading"}}</h2>

    <form hx-post="/todos" hx-target="#todo-list" hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful) this.reset()"
          class="mb-4 flex gap-2">
        <input type="text" name="title" required
               placeholder="{{t "todos.placeholder"}}"
               class="flex-1 rounded-lg border border-zinc-300 bg-white px-3 py-2 text-sm outline-none focus:border-zinc-500 dark:border-zinc-700 dark:bg-zinc-950">
        <button type="submit"
                class="rounded-lg bg-zinc-900 px-4 py-2 text-sm font-medium text-white hover:bg-zinc-700 dark:bg-zinc-100 dark:text-zinc-900 dark:hover:bg-zinc-300">
            {{t "todos.add"}}
        </button>
    </form>

    {{template "todo-list" .}}
</section>
{{end}}
