{{define "todo-list"}}
<ul id="todo-list" class="divide-y divide-zinc-100 dark:divide-zinc-800">
    {{range .Data.Todos}}
    <li class="flex items-center gap-3 py-2">
        <input type="checkbox" {{if .Done}}checked{{end}}
               hx-post="/todos/{{.ID}}/toggle" hx-target="#todo-list" hx-swap="outerHTML"
               class="size-4 accent-zinc-900 dark:accent-zinc-100">
        <span class="flex-1 text-sm {{if .Done}}text-zinc-400 line-through dark:text-zinc-600{{end}}">{{.Title}}</span>
        <button hx-delete="/todos/{{.ID}}" hx-target="#todo-list" hx-swap="outerHTML"
                class="text-sm text-zinc-400 hover:text-red-600" title="{{t "todos.delete"}}">
            &times;
        </button>
    </li>
    {{else}}
    <li class="py-2 text-sm text-zinc-500 dark:text-zinc-400">{{t "todos.empty"}}</li>
    {{end}}
</ul>
{{end}}
