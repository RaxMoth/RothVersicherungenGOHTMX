{{define "page-hero"}}
<section class="px-4 sm:px-6 pt-4 md:pt-6" aria-labelledby="hero-title">
    <div class="relative {{if .Tall}}py-28 md:py-44{{else}}py-20 md:py-32{{end}} px-6 overflow-hidden bg-stone-900 rounded-4xl max-w-[1400px] mx-auto{{if .Image}} bg-cover bg-center{{end}}"
         {{if .Image}}style="background-image: url('{{.Image}}')"{{end}}>
        <div class="absolute inset-0 hero-overlay" aria-hidden="true"></div>
        <div class="relative max-w-4xl mx-auto text-center text-white">
            {{if .Eyebrow}}
            <p class="inline-flex items-center rounded-full bg-white/15 backdrop-blur px-4 py-1.5 text-xs md:text-sm font-semibold mb-6">{{.Eyebrow}}</p>
            {{end}}
            <h1 id="hero-title" class="text-4xl md:text-6xl font-extrabold tracking-tight leading-[1.05]">{{.Title}}</h1>
            {{if .Subtitle}}
            <p class="mt-6 text-base md:text-xl text-white/90 max-w-2xl mx-auto leading-relaxed">{{.Subtitle}}</p>
            {{end}}
        </div>
    </div>
</section>
{{end}}
