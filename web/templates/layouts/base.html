{{define "base"}}<!doctype html>
<html lang="{{.Lang}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}{{t "site.title"}}{{end}}</title>
    <meta name="description" content="{{block "description" .}}{{t "site.description"}}{{end}}">
    <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/output.css">
    <script src="/static/js/htmx.min.js" defer></script>
    <script src="/static/js/nav.js" defer></script>
</head>
<body class="min-h-screen flex flex-col bg-brand-page text-brand-ink">
    <a href="#main" class="skip-link">{{t "nav.skip_to_content"}}</a>
    {{template "nav" .}}
    <main id="main" class="flex-1 pt-[5.5rem] md:pt-[6.5rem]">
        {{block "content" .}}{{end}}
    </main>
    {{template "footer" .}}
</body>
</html>{{end}}
